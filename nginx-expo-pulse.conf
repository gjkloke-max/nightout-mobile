# nginx config for Expo dev server at expo.techies.com
# Copy to /etc/nginx/sites-available/expo-pulse on the server
#
# Prerequisites:
#   - DNS: expo.techies.com → server IP
#   - SSL cert for expo.techies.com (see DEPLOY_STAGING.md)

server {
    listen 443 ssl;
    server_name expo.techies.com;

    # SSL — certbot creates this when you run: certbot certonly --nginx -d expo.techies.com
    ssl_certificate /etc/letsencrypt/live/expo.techies.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/expo.techies.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
