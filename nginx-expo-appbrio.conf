# nginx config for Expo dev server at expo.appbrio.com
# Copy to /etc/nginx/sites-available/expo-appbrio on the server
#
# IMPORTANT: Expo Go uses plain HTTP for exp:// URLs — do NOT terminate SSL on the
# port advertised in the QR code (443). Proxy HTTP :80 → Metro :8081 instead.
#
# Prerequisites:
#   - DNS: expo.appbrio.com → server IP
#   - expo-staging.service sets REACT_NATIVE_PACKAGER_PORT=80

server {
    listen 80;
    listen [::]:80;
    server_name expo.appbrio.com;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
